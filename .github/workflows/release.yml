name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.7.3)'
        required: true

permissions:
  contents: write

# checkout/upload-artifact still ship Node 20 internals; opt their
# JS actions into Node 24 so the runner stops warning about it.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Rename and hash
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/junto-android.apk
          cd artifacts
          sha256sum junto-android.apk > junto-android.apk.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: artifacts/*

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release

      # Build a real Inno Setup installer instead of a fake .exe-renamed-zip.
      # innosetup is preinstalled on windows-latest GH runners as `iscc`.
      - name: Generate Inno Setup script
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $version = '${{ github.event.inputs.version || github.ref_name }}'.TrimStart('v')
          if (-not $version) { $version = '0.0.0' }
          # Inno Setup resolves Source/OutputDir relative to the .iss
          # location. Use absolute paths anchored at the workspace root
          # so it doesn't matter where the script lives.
          $root  = $env:GITHUB_WORKSPACE
          $build = "$root\build\windows\x64\runner\Release\*"
          $out   = "$root\artifacts"
          $iss = @"
          [Setup]
          AppName=Junto
          AppVersion=$version
          AppPublisher=AbobaTeam Production
          AppPublisherURL=https://juntoapp.tech
          DefaultDirName={autopf}\Junto
          DefaultGroupName=Junto
          DisableProgramGroupPage=yes
          OutputDir=$out
          OutputBaseFilename=junto-windows-setup
          Compression=lzma
          SolidCompression=yes
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible
          WizardStyle=modern
          PrivilegesRequired=lowest
          UninstallDisplayIcon={app}\junto.exe

          [Files]
          Source: "$build"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\Junto"; Filename: "{app}\junto.exe"
          Name: "{autodesktop}\Junto"; Filename: "{app}\junto.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "Создать ярлык на рабочем столе"; GroupDescription: "Дополнительные значки:"

          [Run]
          Filename: "{app}\junto.exe"; Description: "Запустить Junto"; Flags: nowait postinstall skipifsilent
          "@
          $iss | Out-File -Encoding utf8 artifacts\junto.iss

      - name: Compile installer with Inno Setup
        shell: pwsh
        run: |
          # Inno Setup 6 ships preinstalled on windows-latest as iscc.exe in PATH.
          iscc artifacts\junto.iss
          # Also keep a portable .zip for users who don't want an installer.
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath artifacts\junto-windows-portable.zip
          $h = (Get-FileHash artifacts\junto-windows-setup.exe -Algorithm SHA256).Hash.ToLower()
          "$h  junto-windows-setup.exe" | Out-File -Encoding ascii artifacts\junto-windows-setup.exe.sha256
          Remove-Item artifacts\junto.iss
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: artifacts/*

  # Linux desktop is dropped for now — media_kit_video's plugin
  # CMakeLists.txt fails to find a GTK/WebKit symbol inside the
  # ephemeral .plugin_symlinks tree on a fresh runner, and getting
  # it green needs more native-build plumbing than the value of
  # shipping an AppImage right now justifies. Web build covers the
  # Linux desktop story for the moment.

  release:
    needs: [android, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          generate_release_notes: true
          files: artifacts/*
