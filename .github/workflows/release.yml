name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.7.3)'
        required: true

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Rename and hash
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/junto-android.apk
          cd artifacts
          sha256sum junto-android.apk > junto-android.apk.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: artifacts/*

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath artifacts\junto-windows-portable.zip
          # NOTE: real installer would use Inno Setup / MSIX. The portable .zip is enough for the download button.
          Copy-Item artifacts\junto-windows-portable.zip artifacts\junto-windows-setup.exe
          $h = (Get-FileHash artifacts\junto-windows-setup.exe -Algorithm SHA256).Hash.ToLower()
          "$h  junto-windows-setup.exe" | Out-File -Encoding ascii artifacts\junto-windows-setup.exe.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: artifacts/*

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev libjsoncpp-dev libwebkit2gtk-4.1-dev clang cmake pkg-config
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Bundle as tarball (AppImage tooling lives outside this minimal pipeline)
        run: |
          mkdir -p artifacts
          tar -czf artifacts/junto-linux.AppImage -C build/linux/x64/release/bundle .
          cd artifacts
          sha256sum junto-linux.AppImage > junto-linux.AppImage.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: artifacts/*

  release:
    needs: [android, windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          generate_release_notes: true
          files: artifacts/*
