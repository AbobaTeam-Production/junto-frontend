name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.7.3)'
        required: true

permissions:
  contents: write

# checkout/upload-artifact still ship Node 20 internals; opt their
# JS actions into Node 24 so the runner stops warning about it.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Rename and hash
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/junto-android.apk
          cd artifacts
          sha256sum junto-android.apk > junto-android.apk.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: artifacts/*

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath artifacts\junto-windows-portable.zip
          # NOTE: real installer would use Inno Setup / MSIX. The portable .zip is enough for the download button.
          Copy-Item artifacts\junto-windows-portable.zip artifacts\junto-windows-setup.exe
          $h = (Get-FileHash artifacts\junto-windows-setup.exe -Algorithm SHA256).Hash.ToLower()
          "$h  junto-windows-setup.exe" | Out-File -Encoding ascii artifacts\junto-windows-setup.exe.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: artifacts/*

  # Linux desktop is dropped for now — media_kit_video's plugin
  # CMakeLists.txt fails to find a GTK/WebKit symbol inside the
  # ephemeral .plugin_symlinks tree on a fresh runner, and getting
  # it green needs more native-build plumbing than the value of
  # shipping an AppImage right now justifies. Web build covers the
  # Linux desktop story for the moment.

  release:
    needs: [android, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          generate_release_notes: true
          files: artifacts/*
